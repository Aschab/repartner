services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PACKS_CONFIG_PATH=/app/configs/packs.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8080
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - PACKS_CONFIG_PATH=/app/configs/packs.json

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles:
      - test
