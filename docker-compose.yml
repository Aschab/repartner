services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - PACKS_CONFIG_PATH=/app/configs/packs.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - PACKS_CONFIG_PATH=/app/configs/packs.json

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles:
      - test
